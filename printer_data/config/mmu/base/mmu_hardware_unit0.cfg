# └────────────────────────────────────────────────────────────────────┘
#
# MMU UNIT: A mmu_unit is a physical MMU. It describes the type, characteristics and capabilities (often defined by
# vendor). The name of the unit is used to locate other components including it's toolhead steppers, optional encoder
# and espooler. You should create a [mmu_unit XXX] section for every MMU connected to this printer. The XXX name
# should appear in the 'units' on the [mmu_machine] and be used in the stepper definitions and accessary names.
#
[mmu_unit unit0]
num_gates: 8				# Number of gates/lanes *this* mmu_unit
vendor:  EMU    			# MMU family
version: 1.0				# MMU hardware version number

display_name:  unit0   			# Display name of mmu_unit in UI's. Defaults to the vendor name
buffer:        unit0   			# Name of sync-feedback [mmu_buffer XXX] if fitted (can be shared with other mmu_units)
toolhead:      default			# Name of [mmu_toolhead XXX] associated with unit (defined in mmu.cfg, can be shared)
extruder_name: extruder			# Name of extruder that mmu_unit is attached to. Defaults to 'extruder'

# PER-GATE environment sensors (EMU style). 'environment_sensor'/'filament_heater' left empty.
# Length of the list MUST equal num_gates. These [temperature_sensor Lane_N] objects are defined elsewhere.
#
environment_sensors: temperature_sensor Lane_0,
                     temperature_sensor Lane_1,
                     temperature_sensor Lane_2,
                     temperature_sensor Lane_3,
                     temperature_sensor Lane_4,
                     temperature_sensor Lane_5,
                     temperature_sensor Lane_6,
                     temperature_sensor Lane_7

# MMU Kinematics
gear_steppers: unit0_gear, unit0_gear_1, unit0_gear_2, unit0_gear_3, unit0_gear_4, unit0_gear_5, unit0_gear_6, unit0_gear_7

# MMU Capabilities
selector_type: VirtualSelector
variable_bowden_lengths: 1		# 1 = If MMU design has different bowden lengths per gate, 0 = bowden length is the same
variable_rotation_distances: 1		# 1 = If MMU design has dissimilar drive/BMG gears, thus rotation distance, 0 = One drive gear (e.g. Tradrack)
require_bowden_move: 1			# 1 = If MMU design has bowden move that is included in load/unload, 0 = zero length bowden (skip bowden move)
filament_always_gripped: 1		# 1 = Filament is always trapped by MMU (most type-B designs), 0 = MMU can release filament
show_bypass: 1				# 1 = Force showing of bypass gate in UI (overruled if selector explicitly implements bypass)


