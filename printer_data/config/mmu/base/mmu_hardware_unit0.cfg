[mmu_buffer unit0]
buffer_range: 16		# Travel between compression/tension (or one sensor and end)
buffer_maxrange: 16		# Absolute max end-to-end travel (mm)

tension_pin:
compression_pin:

# Proportional sync feedback sensor (the PSF analog sensor)
#
analog_pin: lane0:MMU_TH		# ADC pin where the proportional filament pressure sensor is installed
analog_max_compression: 1.0000		# Raw reading at max compression (buffer squeezed)
analog_max_tension:     0.1107		# Raw reading at max tension (buffer expanded)
analog_neutral_point:   0.5553		# Biasing of neutral point (sensor value 0)

register_buffer_sensors: 1

