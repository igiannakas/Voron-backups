#
# One CAN MCU per lane
#
[mcu lane0]
canbus_uuid: cc8f39d714ce 
canbus_interface: can0

[mcu lane1]
canbus_uuid: c2357f5873d7 
canbus_interface: can0

[mcu lane2]
canbus_uuid: 31fb8c95fbfd 
canbus_interface: can0

[mcu lane3]
canbus_uuid: 8579c5130649 
canbus_interface: can0

[mcu lane4]
canbus_uuid: 7d42f7c43687
canbus_interface: can0

[mcu lane5]
canbus_uuid: 3efbe46e5d5f
canbus_interface: can0

[mcu lane6]
canbus_uuid: f050daaa5448 
canbus_interface: can0

[mcu lane7]
canbus_uuid: 49abda4839e6
canbus_interface: can0

# Pin aliases shared by all (identical) lane boards.
[board_pins lane]
mcu: lane0, lane1, lane2, lane3, lane4, lane5, lane6, lane7
aliases:
    MMU_GEAR_UART=PA15,
    MMU_GEAR_STEP=PD0,
    MMU_GEAR_DIR=PD1,
    MMU_GEAR_ENABLE=PD2,
    MMU_GEAR_DIAG=,

    MMU_NEOPIXEL=PD3,
    MMU_NEOPIXEL_LOGO=,

    MMU_PRE_GATE=PB7,
    MMU_POST_GEAR=PB5,

    MMU_TENSION=PB8,
    MMU_COMPRESSION=PB9,

    MMU_TH=PA3,
    MMU_FAN=PA0,
    EJECT_BUTTON=PB6,

