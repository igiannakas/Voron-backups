[mmu_leds unit0]
exit_leds:
  neopixel:_lane0_leds (1,2,3,4)
  neopixel:_lane1_leds (1,2,3,4)
  neopixel:_lane2_leds (1,2,3,4)
  neopixel:_lane3_leds (1,2,3,4)
  neopixel:_lane4_leds (1,2,3,4)
  neopixel:_lane5_leds (1,2,3,4)
  neopixel:_lane6_leds (1,2,3,4)
  neopixel:_lane7_leds (1,2,3,4)
entry_leds:
  neopixel:_lane0_leds (5)
  neopixel:_lane1_leds (5)
  neopixel:_lane2_leds (5)
  neopixel:_lane3_leds (5)
  neopixel:_lane4_leds (5)
  neopixel:_lane5_leds (5)
  neopixel:_lane6_leds (5)
  neopixel:_lane7_leds (5)
status_leds:
logo_leds:
frame_rate: 15

enabled:       True
animation:     True
exit_effect:   gate_status
entry_effect:  filament_color
status_effect: off
logo_effect:   (0, 0, 0)
white_light:   (1, 1, 1)
black_light:   (1, 1, 1)
empty_light:   (0, 0, 0)

# Action effects (must exist in [mmu_led_effect ...] set defined in mmu.cfg / mmu_leds.cfg).
effect_loading:            mmu_blue_clockwise_fast, (0, 0, 0.4)
effect_loading_extruder:   mmu_blue_clockwise_slow, (0, 0, 1)
effect_unloading:          mmu_blue_anticlock_fast, (0, 0, 0.4)
effect_unloading_extruder: mmu_blue_anticlock_slow, (0, 0, 1)
effect_heating:            mmu_breathing_red,       (0.3, 0, 0)
effect_selecting:          mmu_white_fast,          (0.2, 0.2, 0.2)
effect_checking:           mmu_white_fast,          (0.8, 0.8, 0.8)
effect_initialized:        mmu_rainbow,             (0.5, 0.2, 0)
effect_error:              mmu_strobe,              (1, 0, 0)
effect_complete:           mmu_sparkle,             (0.3, 0.3, 0.3)
effect_gate_selected:      mmu_static_blue,         (0, 0, 1)
effect_gate_available:     mmu_static_green,        (0.3, 0.3, 0.3)
effect_gate_available_sel: mmu_ready_green,         (0.75, 0.75, 0.75)
effect_gate_unknown:       mmu_static_orange,       (0.5, 0.2, 0)
effect_gate_unknown_sel:   mmu_ready_orange,        (0.75, 0.3, 0)
effect_gate_empty:         mmu_static_black,        (0, 0, 0)
effect_gate_empty_sel:     mmu_ready_orange2,       (0.2, 0, 0)



