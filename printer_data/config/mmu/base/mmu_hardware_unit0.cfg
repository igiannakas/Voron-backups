color_order: GRBW

[neopixel _lane1_leds]
pin: lane1:MMU_NEOPIXEL
chain_count: 5
color_order: GRBW

[neopixel _lane2_leds]
pin: lane2:MMU_NEOPIXEL
chain_count: 5
color_order: GRBW

[neopixel _lane3_leds]
