# └──────────────────────────────────────────────────────────────────────────────────────────────┘
#
[tmc2209 mmu_stepper unit0_gear]
uart_pin: lane0:MMU_GEAR_UART
run_current: 0.9
hold_current: 0.10
interpolate: True
sense_resistor: 0.110
stealthchop_threshold: 0

[mmu_stepper unit0_gear]
step_pin: lane0:MMU_GEAR_STEP
dir_pin: !lane0:MMU_GEAR_DIR
enable_pin: !lane0:MMU_GEAR_ENABLE
rotation_distance: 22.725		# OVERRIDDEN by calibrated 'mmu_*_gear_rotation_distances' in mmu_vars.cfg
gear_ratio: 1:1
microsteps: 4
full_steps_per_rotation: 200

# Filament Drive Gear_1 --------------------------
[tmc2209 mmu_stepper unit0_gear_1]
uart_pin: lane1:MMU_GEAR_UART
[mmu_stepper unit0_gear_1]
step_pin: lane1:MMU_GEAR_STEP
dir_pin: lane1:MMU_GEAR_DIR
enable_pin: !lane1:MMU_GEAR_ENABLE

