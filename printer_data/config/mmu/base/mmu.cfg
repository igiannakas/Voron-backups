# Section to create alias for pins used by MMU for easier integration into Klippain and RatOS.
# The names match those referenced in the mmu_hardware.cfg file. If you get into difficulty
# you can also comment out this aliases definition and configure the pin names directly
# into mmu_hardware.cfg.
#
[board_pins mmu]
mcu: mmu0, mmu1, mmu2, mmu3, mmu4, mmu5, mmu6, mmu7
aliases:
    MMU_GEAR_UART=PA15,
    MMU_GEAR_STEP=PD0,
    MMU_GEAR_DIR=PD1,
    MMU_GEAR_ENABLE=PD2,
    MMU_GEAR_DIAG=,

    MMU_NEOPIXEL=PD3,
    MMU_NEOPIXEL_LOGO=,

    MMU_PRE_GATE=PB7,
    MMU_POST_GEAR=PB5,

    MMU_TENSION=PB8,
    MMU_COMPRESSION=PB9,

    MMU_TH=PA3,

    MMU_FAN=PA0,

    EJECT_BUTTON=PB6,

[board_pins mmu_box_2]
mcu: mmu8,mmu9,mmu10,mmu11,mmu12
aliases:
    MMU_GEAR_UART=PB6,
    MMU_GEAR_STEP=PB5,
    MMU_GEAR_DIR=PB4,
    MMU_GEAR_ENABLE=PB7,
    MMU_GEAR_DIAG=,

    MMU_NEOPIXEL_BOX=PA2, #PA2,
    MMU_NEOPIXEL_BUTTON=PA4, #PA4,

    MMU_PRE_GATE=PA1,
    MMU_POST_GEAR=PA0,

    MMU_TENSION=PB1, # First lane has the sync feedback sensor attached to it!
    MMU_COMPRESSION=PB0, # First lane has the sync feedback sensor attached to it!
    MMU_TH=PA3, # First lane has the PFS sensor attached to it!

    MMU_FAN=PA15,
    EJECT_BUTTON=PB2,
