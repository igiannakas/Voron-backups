#####################################################
#  Sensorless homing override — Voron 2.4 / 350
#  Sensorless on X only; Y uses a physical endstop.
#
#  All tunables live in [gcode_macro _HOMING_VARIABLES]
#  below — edit there, not inside the macros.
#####################################################

[gcode_macro _HOMING_VARIABLES]
description: Tunable values for the homing override
# --- Currents (A) ---
variable_home_current:        0.85    # SG-tuned current for X home
variable_print_current:       1.20    # Normal running current

# --- Move distances (mm) ---
variable_x_retract:           75      # Back X off from min after home
variable_y_retract:           20      # Back Y off from max after home
variable_y_scoot:             12      # Pre-X-home Y scoot (clears rear gantry)
variable_z_lift:              11      # Z lift when Z position is unknown
variable_z_floor:             30      # Min Z before X/Y home when Z is homed
variable_z_post_home_lift:    30      # Z height to leave at after Z home

# --- Speeds (mm/min) ---
variable_x_retract_speed:     6600
variable_y_retract_speed:     1200
variable_y_scoot_speed:       1200
variable_z_lift_speed:        3000
variable_bed_travel_speed:    12000
variable_z_post_home_speed:   1200

# --- StallGuard settle delays (ms) ---
variable_sg_settle_pre:       2000    # After X-home move-away, before current restore
variable_sg_settle_post:      1000    # After current restore

# --- Bed centre for Z home (mm) ---
variable_bed_center_x:        175
variable_bed_center_y:        175
gcode:
    # Variable holder only — never invoked

[gcode_macro _HOME_X]
gcode:
    {% set v = printer["gcode_macro _HOMING_VARIABLES"] %}
    # CoreXY: both motors carry load during any X move, so drop both currents
    M400
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={v.home_current} HOLDCURRENT={v.home_current}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={v.home_current} HOLDCURRENT={v.home_current}
    G28 X
    G91
    M400
    G1 X-{v.x_retract} F{v.x_retract_speed}
    G90
    # Wait for SG registers to clear, then restore print currents
    M400
    G4 P{v.sg_settle_pre}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={v.print_current} HOLDCURRENT={v.print_current}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={v.print_current} HOLDCURRENT={v.print_current}
    M400
    G4 P{v.sg_settle_post}

[gcode_macro _HOME_Y]
gcode:
    {% set v = printer["gcode_macro _HOMING_VARIABLES"] %}
    G28 Y
    G91
    M400
    G1 Y-{v.y_retract} F{v.y_retract_speed}
    G90

[homing_override]
axes: xyz
gcode:
    {% set v = printer["gcode_macro _HOMING_VARIABLES"] %}

    {% if 'X' not in params and 'Y' not in params and 'Z' not in params %}
      {% set params = 'XYZ' %}
    {% endif %}
    {% set homed_axes = printer.toolhead.homed_axes %}

    # --- Z safety: ensure clearance before X/Y homing ---
    {% if 'z' not in homed_axes %}
      SET_KINEMATIC_POSITION Z=0
      G91
      G1 Z{v.z_lift} F{v.z_lift_speed}
      G90
      {% if 'Z' not in params %}
        M84
        {% set homed_axes = '' %}
      {% endif %}
    {% elif printer.toolhead.position.z < v.z_floor %}
      G90
      G0 Z{v.z_floor} F{v.z_lift_speed}
    {% endif %}

    {% set need_x = 'X' in params or (('Y' in params or 'Z' in params) and 'x' not in homed_axes) %}
    {% set need_y = 'Y' in params or ('Z' in params and 'y' not in homed_axes) %}

    # --- Home X (cutter-clear via Y scoot) ---
    {% if need_x %}
      SET_KINEMATIC_POSITION Y={v.y_scoot}
      G91
      G1 Y-{v.y_scoot} F{v.y_scoot_speed}
      G90
      _HOME_X
    {% endif %}

    # --- Home Y ---
    {% if need_y %}
      _HOME_Y
    {% endif %}

    # --- Home Z at bed centre ---
    {% if 'Z' in params %}
      G0 X{v.bed_center_x} Y{v.bed_center_y} F{v.bed_travel_speed}
      G28 Z
      G1 Z{v.z_post_home_lift} F{v.z_post_home_speed}
    {% endif %}