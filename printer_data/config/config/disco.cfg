#################################################
################### Disco Led ###################
#################################################

[output_pin chamber_leds]
pin: PA0
pwm: True
hardware_pwm: True
cycle_time: 0.001

[gcode_macro CHAMBER_LED_OFF]
description: Chamber LED off
gcode:
    SET_PIN PIN=chamber_leds VALUE=0


[gcode_macro CHAMBER_LED_LOW]
description: Chamber LED Low
gcode:
    SET_PIN PIN=chamber_leds VALUE=0.25


[gcode_macro CHAMBER_LED_ON]
description: Chamber LED on
gcode:
    SET_PIN PIN=chamber_leds VALUE=1.0


[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE7, EXP1_2=PG1,
    EXP1_3=PG0, EXP1_4=PF15,
    EXP1_5=PF14, EXP1_6=PF13,    # Slot in the socket on this side
    EXP1_7=PF12, EXP1_8=PF11,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PE13, EXP2_2=PE12,
    EXP2_3=PE15, EXP2_4=PE11,
    EXP2_5=PE10, EXP2_6=PE14,      # Slot in the socket on this side
    EXP2_7=PE8, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<NC>
