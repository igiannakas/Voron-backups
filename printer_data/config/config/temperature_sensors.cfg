#####################################################################
# 	Temperature Sensor Settings
#####################################################################

[heater_bed]
heater_pin: PA1
sensor_type: Generic 3950
sensor_pin: PC4
max_power: 1.0
min_temp: 0
max_temp: 120

[temperature_sensor buildplate]
sensor_type: Generic 3950
sensor_pin: PB1
min_temp: 0
max_temp: 130

[temperature_sensor RPI]
sensor_type: temperature_host

# Toolhead board sensor next to TMC2209
[temperature_sensor toolhead_board]
sensor_type: Generic 3950
sensor_pin: toolhead_mcu:PA0  
min_temp: 0
max_temp: 180


# Stepper body thermistor
[temperature_sensor stepper_body]
sensor_type: Generic 3950
sensor_pin: PC5
min_temp: 0
max_temp: 200

# Top chamber thermistor - stealthmax exhaust
[temperature_sensor chamber_top]
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PA7
min_temp: 0
max_temp: 100

# Combined chamber sensor
[temperature_sensor chamber]
sensor_type: temperature_combined
sensor_list: temperature_sensor chamber_top, heater_generic heater_chamber
combination_method: mean
maximum_deviation: 999.9

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 130

