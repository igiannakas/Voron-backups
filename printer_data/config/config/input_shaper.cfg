#####################################################################
# 	Input Shaper Settings
#####################################################################

[adxl345]
cs_pin: cartographer:PA0
spi_bus: spi1

#[adxl345]
#spi_bus: spi1
#cs_pin: toolhead_mcu: PA4
#spi_software_sclk_pin: toolhead_mcu: PA5
#spi_software_mosi_pin: toolhead_mcu: PA6
#spi_software_miso_pin: toolhead_mcu: PA7
#axes_map: x,y,z

[resonance_tester]
probe_points: 175, 175, 30
#accel_chip_z: adxl345
accel_chip: adxl345

sweeping_period: 0.0

# Sweeping
#accel_per_hz: 90
#max_freq: 200

# Pulse
accel_per_hz: 100
max_freq: 200

# Z calibration
#accel_per_hz: 300

[shaketune]
result_folder: ~/printer_data/config/K-ShakeTune_results
number_of_results_to_keep: 5000
show_macros_in_webui: True
timeout: 600

[input_shaper]
shaper_freq_x: 106.8 #center frequency for the X axis filter
shaper_type_x: ei # filter type for the X axis
damping_ratio_x: 0.043 # damping ratio for the X axis

shaper_freq_y: 73.6 # center frequency for the Y axis filter
shaper_type_y: ei # filter type for the Y axis
damping_ratio_y: 0.050 # damping ratio for the Y axis

shaper_freq_z: 105 # center frequency for the Z axis filter
shaper_type_z: 3hump_ei # filter type for the Z axis